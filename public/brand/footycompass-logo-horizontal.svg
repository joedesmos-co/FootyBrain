      <circle cx="256" cy="256" r="204" fill="none" stroke="url(#fc-ring2)" stroke-width="26" />
      <circle cx="256" cy="256" r="204" fill="none" stroke="rgba(15,23,42,0.10)" stroke-width="2" />

