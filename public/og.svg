<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#052e16" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <g opacity="0.28">
    <circle cx="980" cy="110" r="180" fill="#22c55e" />
    <circle cx="160" cy="560" r="220" fill="#38bdf8" />
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="92" width="1028" height="446" rx="32" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />
  </g>

  <rect x="120" y="134" width="160" height="10" rx="5" fill="url(#accent)" />

  <text x="120" y="260" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="88" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">
    FootyCompass
  </text>
  <text x="120" y="326" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="38" font-weight="600" fill="#d1fae5">
    Navigate the world of football.
  </text>

  <text x="120" y="402" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="30" font-weight="500" fill="rgba(226,232,240,0.92)">
    Players " Clubs " Leagues " National teams " Quizzes
  </text>

  <g transform="translate(120, 448)">
    <circle cx="22" cy="22" r="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.14)" />
    <text x="22" y="30" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
          font-size="22" font-weight="700" fill="#f8fafc">˝</text>
    <text x="60" y="30" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
          font-size="24" font-weight="600" fill="rgba(226,232,240,0.92)">footycompass.com</text>
  </g>
</svg>

